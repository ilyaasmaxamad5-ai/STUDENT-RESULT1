// COURSE NAMES
const courseNames1 = ["Computer","Software","Cyber","Networking"];
const courseNames2 = ["C.progrming","Hardware-Maintain","IT-Security","Operting-system"];

let currentStudent=null;

// LOGIN
function login(){
  let id=sid.value.trim();
  let pw=pass.value.trim();

  if(students[id] && students[id].pass===pw){
    currentStudent=id;
    showResults();
  } else alert("Wrong ID or Password");
}

// SHOW RESULTS
function showResults(){
  loginDiv.style.display="none";
  resultDiv.style.display="block";
  title.innerHTML="Welcome: "+students[currentStudent].name;

  let g1=displaySemester(students[currentStudent].results,"courseRows1","gpa1");
  let g2=displaySemester(students[currentStudent].results2,"courseRows2","gpa2");

  totalGpa.innerHTML="Total GPA: "+((g1+g2)/2).toFixed(2);
}

// DISPLAY
function displaySemester(data,tableId,gpaId){
  let rows="",points=0;

  for(let i=0;i<4;i++){
    let total=data[i].reduce((a,b)=>a+b,0);
    let grade=getGrade(total);
    let gp=getPoint(grade);
    points+=gp;

    rows+=`
    <tr>
      <td>${(tableId==="courseRows1"?courseNames1[i]:courseNames2[i])}</td>
      <td>${data[i][0]}</td>
      <td>${data[i][1]}</td>
      <td>${data[i][2]}</td>
      <td>${data[i][3]}</td>
      <td>${total}</td>
      <td>${grade}</td>
    </tr>`;
  }

  document.getElementById(tableId).innerHTML=rows;
  let gpa=(points/4);
  document.getElementById(gpaId).innerHTML="GPA: "+gpa.toFixed(2);
  return gpa;
}

// GRADE
function getGrade(t){
  if(t>=85)return"A";
  if(t>=70)return"B";
  if(t>=55)return"C";
  if(t>=45)return"D";
  return"F";
}

function getPoint(g){
  return {A:4,B:3,C:2,D:1,F:0}[g];
}

// LOGOUT
function logout(){
  currentStudent=null;
  loginDiv.style.display="block";
  resultDiv.style.display="none";
}
